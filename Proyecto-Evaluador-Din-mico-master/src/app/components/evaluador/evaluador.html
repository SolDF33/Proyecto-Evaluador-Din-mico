<div class="contenedor">

  <h1>Evaluación de Programación Web</h1>

  <div class="progreso">

    <p>Progreso: {{ progreso }}%</p>

    <progress
      [value]="progreso"
      max="100">
    </progress>

  </div>

  <div
    class="pregunta"
    *ngFor="let pregunta of evaluacion.preguntas; let i = index">

    <h3>
      {{ i + 1 }}. {{ pregunta.enunciado }}
    </h3>

    <div
      class="opcion"
      *ngFor="let opcion of pregunta.opciones; let j = index">

      <label>

        <input
          type="radio"
          [name]="'pregunta' + i"
          [value]="j"
          [(ngModel)]="respuestas[i]">

        {{ opcion }}

      </label>

    </div>

  </div>

  <button (click)="finalizar()">
    Finalizar Evaluación
  </button>

</div>
