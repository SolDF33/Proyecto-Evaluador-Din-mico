<div class="blog-container">
  <h1>Blog del Equipo</h1>
  
  <div *ngFor="let post of posts" class="post">
    <h2>{{ post.titulo }}</h2>
    <p class="meta">Publicado por: {{ post.autor }}</p>
    <p><strong>Resumen:</strong> {{ post.resumen }}</p>
    
    <div *ngIf="post.abierto" class="texto-expandido">
      <p>{{ post.completo }}</p>
    </div>

    <button (click)="togglePost(post)" class="boton boton-azul">
      {{ post.abierto ? 'Leer menos' : 'Leer más' }}
    </button>
  </div>
</div>
